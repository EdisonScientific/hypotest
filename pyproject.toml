[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=64"]

[dependency-groups]
dev = [
    "hypotest[dev]",
]

[project]
authors = [
    {email = "support@edisonscientific.com", name = "Edison Scientific Technical Staff"},
]
classifiers = [
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python",
    "Topic :: Software Development",
]
dependencies = [
    "aiodocker",
    "fhaviary[server]>=0.31.0",  # Pin for Message.is_multimodal fix
    "jupyter-client",
    "nbformat",
    "pillow",
    "pydantic",
]
description = "hypotest package"
keywords = []
maintainers = [
    {email = "support@edisonscientific.com", name = "Edison Scientific Technical Staff"},
]
name = "hypotest"
readme = "README.md"
requires-python = ">=3.11,<3.14"
version = "0.0.1"

[project.optional-dependencies]
dev = [
    "fhlmi>=0.25.0",  # Pin for headers
    "mypy>=1.8",
    "prek",
    "pytest-asyncio",
    "pytest-recording",
    "pytest-rerunfailures",
    "pytest-subtests",  # TODO remove after pytest v9
    "pytest-sugar",
    "pytest-timeout",
    "pytest-timer[colorama]",
    "pytest-xdist",
    "pytest>=8",  # Pin to keep recent
    "types-Flask-SocketIO>=5.3.0",
    "vcrpy>=8",  # Pin for dropping unused requests support
]

[tool.codespell]
check-filenames = true
check-hidden = true
skip = "uv.lock"

[tool.coverage]

[tool.coverage.report]
exclude_also = [
    "@overload",
    "if TYPE_CHECKING:",
]
precision = 2

[tool.coverage.run]
branch = true
command_line = "-m pytest"

[tool.mypy]
check_untyped_defs = true
enable_error_code = [
    "ignore-without-code",
    "mutable-override",
    "redundant-cast",
    "redundant-expr",
    "redundant-self",
    "truthy-bool",
    "truthy-iterable",
    "unimported-reveal",
    "unreachable",
    "unused-ignore",
]
error_summary = false
exclude = [
    "^\\.?venv",
]
platform = "linux"
plugins = ["pydantic.mypy"]
pretty = true
show_column_numbers = true
show_error_codes = true
show_error_context = true
warn_redundant_casts = true
warn_unreachable = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.pylint]

[tool.pylint.format]
max-line-length = 120

[tool.pylint.main]
ignore-patterns = [
    "^version\\.py$",
]
jobs = 0

[tool.pylint.messages_control]
disable = [
    "bare-except",
    "broad-exception-caught",
    "broad-exception-raised",
    "consider-using-in",
    "cyclic-import",
    "dangerous-default-value",
    "empty-docstring",
    "expression-not-assigned",
    "fixme",
    "function-redefined",
    "global-statement",
    "global-variable-not-assigned",
    "import-outside-toplevel",
    "invalid-name",
    "keyword-arg-before-vararg",
    "line-too-long",
    "logging-fstring-interpolation",
    "logging-too-many-args",
    "missing-docstring",
    "missing-final-newline",
    "no-else-return",
    "no-member",
    "no-value-for-parameter",
    "protected-access",
    "raise-missing-from",
    "redefined-builtin",
    "too-few-public-methods",
    "too-many-ancestors",
    "too-many-arguments",
    "too-many-boolean-expressions",
    "too-many-branches",
    "too-many-instance-attributes",
    "too-many-lines",
    "too-many-locals",
    "too-many-positional-arguments",
    "too-many-public-methods",
    "too-many-return-statements",
    "too-many-statements",
    "ungrouped-imports",
    "unidiomatic-typecheck",
    "unnecessary-dict-index-lookup",
    "unreachable",
    "unspecified-encoding",
    "unsubscriptable-object",
    "unsupported-membership-test",
    "unused-argument",
    "unused-import",
    "unused-variable",
    "use-sequence-for-iteration",
    "wrong-import-order",
    "wrong-import-position",
]
enable = [
    "useless-suppression",
]

[tool.pylint.reports]
score = false

[tool.pylint.similarities]
min-similarity-lines = 20

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "session"
filterwarnings = []
testpaths = ["tests"]
timeout = 1000

[tool.refurb]
enable_all = true
ignore = [
    "FURB101",
    "FURB103",
    "FURB108",
    "FURB120",
    "FURB141",
    "FURB144",
    "FURB146",
    "FURB147",
    "FURB150",
    "FURB155",
]

[tool.ruff]
line-length = 120
unsafe-fixes = true

[tool.ruff.format]
docstring-code-format = true
preview = true

